name: FinanceApp
options:
  bundleIdPrefix: com.financeapp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    # Set DEVELOPMENT_TEAM to your 10-char Apple Team ID (visible in Xcode →
    # Settings → Accounts → your Apple ID → "Team ID"), e.g. "ABCDE12345".
    # Leave blank and pick your team in Xcode once via Signing & Capabilities.
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_ALLOWED: YES
    CODE_SIGNING_REQUIRED: YES
targets:
  FinanceApp:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "README.md"
          - "FinanceApp.xcodeproj"
          - "build"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.financeapp.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES